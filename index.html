<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Bird Repeller Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-900 text-white min-h-screen font-outfit">

    <!-- Background Pattern -->
    <div class="fixed inset-0 z-0 opacity-20 pointer-events-none" style="background-image: radial-gradient(#4ADE80 1px, transparent 1px); background-size: 30px 30px;"></div>

    <div class="relative z-10 max-w-6xl mx-auto px-4 py-8">
        
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 glass-panel p-6 rounded-2xl">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-green-500 rounded-full flex items-center justify-center text-2xl shadow-[0_0_20px_rgba(74,222,128,0.5)]">
                    <i class="fa-solid fa-crow"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-emerald-600">Smart Bird Repeller</h1>
                    <p class="text-gray-400 text-sm">IoT Crop Protection System</p>
                </div>
            </div>
            <div class="mt-4 md:mt-0 flex items-center gap-3 bg-gray-800/80 px-4 py-2 rounded-full border border-gray-700">
                <div class="relative flex h-3 w-3">
                  <span id="status-ping" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                  <span id="status-dot" class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                </div>
                <span id="device-status" class="font-medium text-green-400">Device Online</span>
            </div>
        </header>

        <!-- Dashboard Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            
            <!-- Sensor PIR Card -->
            <div class="glass-panel p-6 rounded-2xl flex flex-col justify-between card-hover">
                <div class="flex justify-between items-start mb-4">
                    <h3 class="text-gray-400 font-medium">Sensor Gerak (PIR)</h3>
                    <i class="fa-solid fa-person-walking text-blue-400 text-xl"></i>
                </div>
                <div>
                    <div id="pir-value" class="text-3xl font-bold mb-1">Aman</div>
                    <p id="pir-desc" class="text-sm text-blue-400">Tidak ada pergerakan</p>
                </div>
            </div>

            <!-- Ultrasonic Card -->
            <div class="glass-panel p-6 rounded-2xl flex flex-col justify-between card-hover">
                <div class="flex justify-between items-start mb-4">
                    <h3 class="text-gray-400 font-medium">Jarak Objek</h3>
                    <i class="fa-solid fa-ruler text-purple-400 text-xl"></i>
                </div>
                <div>
                    <div class="flex items-baseline gap-1">
                        <span id="distance-value" class="text-4xl font-bold">--</span>
                        <span class="text-gray-400">cm</span>
                    </div>
                    <p class="text-sm text-purple-400 mt-1">Sensor Ultrasonik</p>
                </div>
            </div>

            <!-- Buzzer Card -->
            <div class="glass-panel p-6 rounded-2xl flex flex-col justify-between card-hover">
                <div class="flex justify-between items-start mb-4">
                    <h3 class="text-gray-400 font-medium">Status Buzzer</h3>
                    <i class="fa-solid fa-volume-high text-red-400 text-xl"></i>
                </div>
                <div>
                    <div id="buzzer-value" class="text-3xl font-bold mb-1">OFF</div>
                    <p id="buzzer-desc" class="text-sm text-gray-400">Alarm diam</p>
                </div>
            </div>

            <!-- LED Card -->
            <div class="glass-panel p-6 rounded-2xl flex flex-col justify-between card-hover">
                <div class="flex justify-between items-start mb-4">
                    <h3 class="text-gray-400 font-medium">Status LED</h3>
                    <i class="fa-solid fa-lightbulb text-yellow-400 text-xl"></i>
                </div>
                <div>
                    <div id="led-value" class="text-3xl font-bold mb-1">OFF</div>
                    <p id="led-desc" class="text-sm text-gray-400">Lampu mati</p>
                </div>
            </div>

        </div>

        <!-- Activity Log -->
        <div class="glass-panel rounded-2xl overflow-hidden flex flex-col h-[400px]">
            <div class="p-6 border-b border-gray-700/50 bg-gray-800/30 flex justify-between items-center">
                <h2 class="text-xl font-bold flex items-center gap-2">
                    <i class="fa-solid fa-list-ul text-green-400"></i> Log Aktivitas
                </h2>
                <button id="clear-log" class="text-sm text-red-400 hover:text-red-300 transition-colors bg-red-400/10 px-3 py-1.5 rounded-lg border border-red-400/20">
                    <i class="fa-solid fa-trash-can mr-1"></i> Bersihkan
                </button>
            </div>
            <div class="flex-1 overflow-y-auto p-2" id="log-container">
                <ul id="activity-list" class="space-y-2 p-4">
                    <!-- Logs will be inserted here dynamically -->
                    <li class="text-center text-gray-500 italic py-4" id="empty-log-msg">Belum ada aktivitas tercatat</li>
                </ul>
            </div>
        </div>

    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
