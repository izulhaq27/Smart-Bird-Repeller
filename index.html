<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Bird Repeller | Dashboard</title>
    <meta name="description" content="Dashboard monitoring real-time sistem pengusir burung berbasis IoT dengan ESP32 dan Blynk Cloud.">

    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Animated Background -->
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
    <div class="noise-overlay"></div>

    <div class="app-wrapper">

        <!-- ===== HEADER ===== -->
        <header class="header">
            <div class="header-logo">
                <div class="logo-icon">
                    <i class="fa-solid fa-crow"></i>
                </div>
                <div>
                    <h1 class="logo-title">Smart Bird Repeller</h1>
                    <p class="logo-sub">IoT Crop Protection System</p>
                </div>
            </div>

            <div class="header-right">
                <div class="status-badge" id="status-badge">
                    <span class="status-dot" id="status-dot"></span>
                    <span id="device-status">Checking...</span>
                </div>
                <div class="last-update">
                    <i class="fa-solid fa-rotate fa-spin" id="refresh-icon"></i>
                    <span id="last-update-time">--:--</span>
                </div>
            </div>
        </header>

        <!-- ===== SENSOR CARDS ===== -->
        <section class="cards-grid">

            <!-- PIR Card -->
            <div class="card card--pir" id="card-pir">
                <div class="card-header">
                    <span class="card-label">Sensor Gerak</span>
                    <div class="card-icon card-icon--blue">
                        <i class="fa-solid fa-person-walking"></i>
                    </div>
                </div>
                <div class="card-value" id="pir-value">AMAN</div>
                <p class="card-desc" id="pir-desc">Tidak ada pergerakan</p>
                <div class="card-badge card-badge--ok" id="pir-badge">PIR</div>
            </div>

            <!-- Distance Card -->
            <div class="card card--distance" id="card-distance">
                <div class="card-header">
                    <span class="card-label">Jarak Objek</span>
                    <div class="card-icon card-icon--purple">
                        <i class="fa-solid fa-wave-square"></i>
                    </div>
                </div>
                <div class="card-value-group">
                    <span class="card-value" id="distance-value">--</span>
                    <span class="card-unit">cm</span>
                </div>
                <p class="card-desc">Sensor Ultrasonik HC-SR04</p>
                <div class="card-badge card-badge--purple">V1</div>
            </div>

            <!-- Buzzer Card -->
            <div class="card card--buzzer" id="card-buzzer">
                <div class="card-header">
                    <span class="card-label">Status Buzzer</span>
                    <div class="card-icon card-icon--pink">
                        <i class="fa-solid fa-volume-high"></i>
                    </div>
                </div>
                <div class="card-value" id="buzzer-value">OFF</div>
                <p class="card-desc" id="buzzer-desc">Alarm tidak aktif</p>
                <div class="card-indicator" id="buzzer-indicator"></div>
            </div>

            <!-- LED Card -->
            <div class="card card--led" id="card-led">
                <div class="card-header">
                    <span class="card-label">Status LED</span>
                    <div class="card-icon card-icon--yellow">
                        <i class="fa-solid fa-lightbulb"></i>
                    </div>
                </div>
                <div class="card-value" id="led-value">OFF</div>
                <p class="card-desc" id="led-desc">Lampu indikator mati</p>
                <div class="card-indicator" id="led-indicator"></div>
            </div>

        </section>

        <!-- ===== ACTIVITY LOG ===== -->
        <section class="log-panel">
            <div class="log-header">
                <div class="log-title">
                    <i class="fa-solid fa-timeline"></i>
                    <h2>Log Aktivitas</h2>
                    <span class="log-count" id="log-count">0</span>
                </div>
                <button class="btn-clear" id="clear-log">
                    <i class="fa-solid fa-trash-can"></i>
                    <span>Bersihkan</span>
                </button>
            </div>
            <div class="log-body" id="log-container">
                <ul class="log-list" id="activity-list">
                    <li class="log-empty" id="empty-log-msg">
                        <i class="fa-regular fa-clock fa-2x"></i>
                        <p>Belum ada aktivitas tercatat</p>
                    </li>
                </ul>
            </div>
        </section>

    </div><!-- end app-wrapper -->

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
