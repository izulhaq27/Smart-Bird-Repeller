<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blynk API Tester</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { color: #10b981; }
        .form-group {
            margin: 15px 0;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background: #10b981;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
            margin-top: 10px;
        }
        button:hover {
            background: #059669;
        }
        .output {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 4px;
            margin-top: 20px;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 400px;
            overflow-y: auto;
        }
        .success { color: #10b981; }
        .error { color: #dc2626; }
        .info { color: #3b82f6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Blynk API Tester</h1>
        <p>Tool untuk debug API calls ke Blynk Cloud</p>

        <div class="form-group">
            <label>Blynk Auth Token:</label>
            <input type="text" id="token" value="RLSj9w8sJJsbpWAa6v_ds5ndJSs1cPKs" placeholder="Paste token Anda di sini">
        </div>

        <div class="form-group">
            <label>Virtual Pin (V0-V3):</label>
            <input type="text" id="pin" value="V0" placeholder="V0, V1, V2, atau V3">
        </div>

        <div>
            <button onclick="testGetPin()">📡 Test GET Pin Value</button>
            <button onclick="testAllPins()">📡 Test All Pins (V0-V3)</button>
            <button onclick="testCheckConnection()">✓ Test Connection Status</button>
            <button onclick="clearOutput()">🗑️ Clear Output</button>
        </div>

        <div class="output" id="output">
            <span class="info">[Hasil test akan muncul di sini]</span>
        </div>
    </div>

    <script>
        const OUTPUT_EL = document.getElementById('output');

        function log(message, type = 'info') {
            const span = document.createElement('div');
            span.className = type;
            span.textContent = message;
            OUTPUT_EL.appendChild(span);
            OUTPUT_EL.scrollTop = OUTPUT_EL.scrollHeight;
        }

        function clearOutput() {
            OUTPUT_EL.innerHTML = '';
        }

        async function testGetPin() {
            clearOutput();
            const token = document.getElementById('token').value;
            const pin = document.getElementById('pin').value;

            log(`🔗 Testing GET for pin ${pin}...`);
            log(`Token: ${token.substring(0, 10)}...`, 'info');

            const urls = [
                `https://blynk.cloud/external/api/get?token=${token}&pin=${pin}`,
                `https://blynk.cloud/external/api/get/${pin}?token=${token}`,
            ];

            for (let url of urls) {
                log(`\n📍 URL: ${url}`, 'info');
                try {
                    const response = await fetch(url);
                    log(`Status: ${response.status}`, response.ok ? 'success' : 'error');
                    
                    const data = await response.text();
                    log(`Response: ${data}`, 'info');
                } catch (error) {
                    log(`❌ Error: ${error.message}`, 'error');
                }
            }
        }

        async function testAllPins() {
            clearOutput();
            const token = document.getElementById('token').value;
            const pins = ['V0', 'V1', 'V2', 'V3'];

            log(`🔗 Testing ALL Pins (V0-V3)...`);
            log(`Token: ${token.substring(0, 10)}...`, 'info');

            for (let pin of pins) {
                const url = `https://blynk.cloud/external/api/get?token=${token}&pin=${pin}`;
                log(`\n📍 ${pin}: ${url.substring(url.indexOf('api'))}`, 'info');
                
                try {
                    const response = await fetch(url);
                    const data = await response.text();
                    log(`✓ ${response.status}: ${data}`, response.ok ? 'success' : 'error');
                } catch (error) {
                    log(`✗ ${error.message}`, 'error');
                }
            }
        }

        async function testCheckConnection() {
            clearOutput();
            const token = document.getElementById('token').value;

            log(`🔗 Testing Connection Status...`);
            log(`Token: ${token.substring(0, 10)}...`, 'info');

            const url = `https://blynk.cloud/external/api/get?token=${token}&pin=V0`;
            
            try {
                log(`\n📍 URL: ${url}`, 'info');
                const response = await fetch(url);
                
                if (response.ok) {
                    const data = await response.text();
                    log(`✓ SUCCESS - Device/Virtual Pins Connected!`, 'success');
                    log(`Response: ${data}`, 'info');
                } else {
                    log(`✗ ERROR - Status ${response.status}`, 'error');
                    const data = await response.text();
                    log(`Response: ${data}`, 'info');
                    
                    if (response.status === 400) {
                        log(`\n⚠️ HTTP 400 berarti:`, 'error');
                        log(`1. Virtual Pin tidak ada atau tidak di-update di Arduino`, 'error');
                        log(`2. Arduino belum mengirim BLYNK_READ() untuk Virtual Pin`, 'error');
                        log(`3. Token sudah expired atau salah`, 'error');
                    }
                }
            } catch (error) {
                log(`❌ Network Error: ${error.message}`, 'error');
                log(`Pastikan koneksi internet aktif`, 'error');
            }
        }

        // Auto run test saat load
        window.addEventListener('load', () => {
            log('💡 Tip: Klik salah satu tombol untuk test API', 'info');
            log('Jika dapat HTTP 400, berarti Arduino belum upload kode dengan BLYNK_READ(V0-V3)', 'error');
        });
    </script>
</body>
</html>
